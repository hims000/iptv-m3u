name: 更新 CCTV 直播源 M3U

permissions:
  contents: write
  actions: read

on:
  schedule:
    - cron: '0 2,8,14,20 * * *'
  workflow_dispatch:

jobs:
  update-m3u:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libnspr4 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64 libxshmfence1 libglib2.0-0

      - name: 安装 Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium --with-deps

      - name: 运行抓取脚本
        run: python main.py

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if [ -f cctv_live.m3u ]; then
            git add cctv_live.m3u
            if git diff --staged --quiet; then
              echo "✅ 文件无变化，跳过提交"
            else
              git commit -m "📺 自动更新 CCTV 直播源 $(date '+%Y-%m-%d %H:%M:%S')"
              git push
            fi
          else
            echo "❌ 未找到 cctv_live.m3u 文件"
            exit 1
          fi
